#  Die Grundidee der Regression 

## Was untersucht die EBF?

- Einfluss von X auf die Noten (oder Kompetenzen) von Schülerinnen/Schüler (SuS)
- Einfluss von X auf den Übergang (Ja/Nein) / Erreichen eines Schulabschlusses (Ja/Nein) von SuS
- Einfluss der Ausgestaltung des Bildungssystems (Klassengröße, G8/G9) auf Y
- (Kausale) Effekt von X auf Y
- Anwendungsbeispiel der Sitzung: Haben große Eltern auch große Kinder?

&lt;p style="font-size:125%;"&gt;Regressieren heißt zurückführen: Eine abhängige metrische Variable (AV wie bspw. Körpergröße, die Schulleistung, etc.) wird auf eine oder mehrere unabhängige Variable (UV wie die Körpergröße der Eltern) zurückgeführt (sprich: regressiert). &lt;/p&gt; 


&lt;p style="font-size:125%;"&gt;Der Zusammenhang zwischen der UV und der AV wird durch eine Funktionsgerade beschrieben. Wir tragen alle Werte der UV und der AV in einem Diagramm ab und legen eine Gerade in die Datenwolke, welche den Zusammenhang zwischen UV and AV möglichst präzise beschreibt.  &lt;/p&gt;

#  Interpretation und KQ Schätzung 

### Kochrezept Interpretation

`$$\hat{Y}=\beta_0 + \beta_1 x_1 + \epsilon$$`

 - `\(\beta_0\)`: Durchschnittlicher Wert der abhängigen Variable y, wenn alle anderen Einflussgrößen gleich 0 sind. (y-Achsensabschnitt oder Intercept)

- `\(\beta_1\)`: Verändert sich die unabhängige Variable X um eine Einheit, so verändert sich die abhängige Variable um β1 Einheiten (Steigung)

- `\(\epsilon\)`: Fehlerterm (Residuum)



---

library(HistData)
lm(child ~ parent, data = Galton)

class: center, middle

&lt;p style="font-size:125%;"&gt;Bei der Regression soll die Gerade den Funktionszusammenhang so gut wie möglich beschreiben. Hierfür nutzen wir den KQ Schätzer.&lt;/p&gt; 

&lt;p style="font-size:125%;"&gt;Die Gerade wird so durch die Punktewolke gelegt, dass die Summe der quadrierten Residuen möglichst klein ist. Hierfür wird die Methode der kleinsten Quadrate (KQ Schätzer) eingesetzt, häufig auch Ordinary Least Squares (OLS) genannt.&lt;/p&gt; 




---
class: center, middle


## Beim KQ Schätzer werden die Residuen quadriert, weil …

### - sich sonst positive und negative Abweichungen ausgleichen.

### - stärkere Abweichungen stärker in die Berechnung einfließen sollen.

### Der Erwartungswert der Residuen ist gleich 0, d.h. im Durchschnitt sind die Fehler 0: E(u)=0.

## Math Wizardy: The Slope spell


``` r
model.galton&lt;-lm(child ~ parent, Galton)
model.galton$coefficients
```

```
## (Intercept)      parent 
##  23.9415302   0.6462906
```


`$$m=\sum_{i=1}^n\frac{(x_i-\bar{x})(y_i-\bar{y})}{(x_i-\bar{x})^2}$$`


``` r
Galton %&gt;%
  summarise(mean_x = mean(parent),
         mean_y = mean(child),
*        cov  = sum((parent - mean_x)*(child-mean_y)),
*        var_x = sum((parent - mean_x)^2),
*        slope = cov / var_x
         )
```

```
##     mean_x   mean_y      cov    var_x     slope
## 1 68.30819 68.08847 1913.898 2961.358 0.6462906
```

## Math Wizardy: The Intercept spell

`$$t=\bar{y}-m\bar{y}$$`



``` r
intercept &lt;- function(x, y, m){
* t &lt;- mean(y) - (m * mean(x))
  return(t)
}

Galton_slope &lt;- 0.6462906


Galton_intercept &lt;- intercept(Galton$parent, 
                              Galton$child, 
                              Galton_slope)
Galton_intercept
```

```
## [1] 23.94153
```

## Multivariate Analysen

### - Bivariate vs. multivariate Analysen
### - Funktionsgleichung wird mit weiteren Koeffizienten (Variablen) erweitert
### - Ceteris paribus (d.h. unter sonst gleichen Bedingungen): Der Einfluss von X auf Y kann unter Konstanthaltung weiterer Variablen berechnet werden

## Identifikation eines kausalen Effekts....

- **mit Hilfe der Regression:** Berechnung eines Effekts durch Kontrolle beobachteter Variablen, d.h. Kontrolle aller Variablen die sowohl den Treatmentstatus beeinflussen und einen Einfluss auf die abhängige Variable haben.

- **Hoffnung**: Nach Kontrolle der Variablen ist die Zuweisung des Treatmentstatus Klassengröße „so gut wie zufällig“ (CIA)

- **Merke:** Konditionale Unabhängigkeit (conditional independence assumption, CIA): Bei der Regression muss die Annahme getroffen werden, dass nach der Kontrolle der anderen unabhängigen Variablen die Verteilung der Einheiten über die Treatment- und Kontrollgruppe in Hinblick auf die abhängige Variable so gut wie zufällig erfolgt.

# R²

### Die Güte der Vorhersage der Regression. Ein kurzer Auszug zum Nachlesen.

&lt;p style="font-size:125%;"&gt;“In vielen Fällen ist die Vorhersage der Regression nicht perfekt, d.h. es werden Fehler gemacht. Es handelt dabei sich um die Differenz zwischen dem vorhergesagten Wert (der Gerade) und den beobachteten Werten.”&lt;/p&gt; 





---
class: center, middle


&lt;p style="font-size:125%;"&gt;“R-Quadrat ist ein Indikator, der uns hilft zu beurteilen, wie groß der Fehler ist oder wie gut das Modell die Zielvariable (Outcome) erklärt.”&lt;/p&gt; 

&lt;p style="font-size:125%;"&gt;“Um R-Quadrat zu verstehen, müssen wir zuerst die Gesamtvarianz (Streuung) von X und Y uns vorstellen. Nehmen wir an, dass X gar keinen Einfluss auf Y hat, dann wäre der Beta-Koeffizient und damit die Steigung der Geraden gleich 0.” &lt;/p&gt; 

&lt;p style="font-size:125%;"&gt;“D.h. es ist egal welcher X-Wert vorliegt, wir würden immer den gleichen Y-Wert beobachten. Die Gerade wäre flach. Das einzige zur Verfügung stehende Mittel um Y vorherzusagen, wäre beispielsweise das arithmetische Mittel von X und dies ist der durchschnittliche Fehler. ” 
&lt;/p&gt; 

 


---
class: center, middle

&lt;p style="font-size:125%;"&gt;“Aber wir haben im Online Tool ja bereits eine Regressionslinie angepasst. Auf Grundlage der beobachteten Werte von X können wir Y also bis zu einem gewissen Grad erklären.” &lt;/p&gt; 

&lt;p style="font-size:125%;"&gt;“Wir kennen demnach die Gesamtvarianz und die erklärte Varianz. Mit diesen zwei Werten können wir R² berechnen und somit den Fehler des Modells bewerten. R² ist der Anteil (%) der Varianz von Y, der durch die Regression vorhersagbar ist. Also die erklärte Varianz geteilt durch die Gesamtvarianz.”&lt;/p&gt; 

&lt;p style="font-size:125%;"&gt;“Grafisch und an einem Beispiel lässt sich dies leichter nachvollziehen.”&lt;/p&gt; 



---

### ERROR

&lt;img src="media/pR8.png" style="width: 100%" border = "1px solid #555;" /&gt;


---

### Gesamtvarianz vs. Erklärte Varianz

&lt;img src="media/pR9.png" style="width: 100%" border = "1px solid #555;" /&gt;



---

## Merke: 

&gt; R² ist der Anteil der erklärten Variation an der Gesamtvariation und liegt zwischen 0 und 1. 

## Interpretation:

 - R² = 0: Die Regression (X) trägt nichts zur Erklärung von Y bei.
 - R² = 1: Die Regressionsfunktion erklärt Y perfekt (alle Punkte liegen genau auf der Geraden).
 - R² = 0,2: 20% der Varianz wird durch die unabhängige(n) Variable(n) erklärt.
